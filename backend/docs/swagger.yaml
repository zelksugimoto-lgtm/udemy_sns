        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 投稿削除
      tags:
      - posts
    get:
      consumes:
      - application/json
      description: IDから投稿を取得
      parameters:
      - description: 投稿ID
        in: path
        name: id
        required: true
