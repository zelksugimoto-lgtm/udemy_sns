host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Twitter風のSNSアプリケーションのREST API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: SNS Application API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: メールアドレスとパスワードでログインし、JWTトークンを返す
      parameters:
      - description: ログイン情報
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_yourusername_sns-app_internal_dto_request.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_internal_dto_response.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
      summary: ログイン
      tags:
      - auth
  /auth/me:
    get:
      consumes:
      - application/json
      description: JWTトークンから現在ログイン中のユーザー情報を取得
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_internal_dto_response.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 現在のユーザー情報取得
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: 新しいユーザーを登録し、JWTトークンを返す
      parameters:
      - description: 登録情報
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_yourusername_sns-app_internal_dto_request.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_internal_dto_response.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
      summary: ユーザー登録
      tags:
      - auth
  /bookmarks:
    get:
      consumes:
      - application/json
      description: ブックマークした投稿の一覧を取得
      parameters:
      - description: '取得件数（デフォルト: 20）'
        in: query
        name: limit
        type: integer
      - description: 'オフセット（デフォルト: 0）'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_internal_dto_response.BookmarkListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: ブックマーク一覧取得
      tags:
      - bookmarks
  /comments/{id}:
    delete:
      consumes:
      - application/json
      description: コメントを削除（論理削除、コメント投稿者のみ）
      parameters:
      - description: コメントID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: コメント削除
      tags:
      - comments
  /comments/{id}/like:
    delete:
      consumes:
      - application/json
      description: コメントのいいねを削除
      parameters:
      - description: コメントID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: コメントのいいね解除
      tags:
      - likes
    post:
      consumes:
      - application/json
      description: コメントにいいねを追加
      parameters:
      - description: コメントID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "409":
          description: 既にいいね済み
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: コメントにいいね
      tags:
      - likes
  /notifications:
    get:
      consumes:
      - application/json
      description: ログイン中のユーザーの通知一覧を取得
      parameters:
      - description: '取得件数（デフォルト: 20）'
        in: query
        name: limit
        type: integer
      - description: 'オフセット（デフォルト: 0）'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_internal_dto_response.NotificationListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 通知一覧取得
      tags:
      - notifications
  /notifications/{id}/read:
    patch:
      consumes:
      - application/json
      description: 指定した通知を既読にする
      parameters:
      - description: 通知ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 通知を既読にする
      tags:
      - notifications
  /notifications/read-all:
    post:
      consumes:
      - application/json
      description: ログイン中のユーザーのすべての通知を既読にする
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: すべての通知を既読にする
      tags:
      - notifications
  /posts:
    post:
      consumes:
      - application/json
      description: 新しい投稿を作成
      parameters:
      - description: 投稿内容
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_yourusername_sns-app_internal_dto_request.CreatePostRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_internal_dto_response.PostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_sns-app_pkg_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 投稿作成
      tags:
      - posts
  /posts/{id}:
    delete:
      consumes:
      - application/json
      description: 投稿を削除（論理削除、投稿者のみ）
      parameters:
      - description: 投稿ID
        in: path
