openapi: 3.0.0
info:
  description: Twitter風のSNSアプリケーションのREST API
  title: SNS Application API
  termsOfService: http://swagger.io/terms/
  contact:
    name: API Support
    url: http://www.swagger.io/support
    email: support@swagger.io
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: "1.0"
paths:
  /auth/login:
    post:
      description: メールアドレスとパスワードでログインし、JWTトークンを返す
      tags:
        - auth
      summary: ログイン
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/github_com_yourusername_sns-app_internal_dto_reques\
                t.LoginRequest"
        description: ログイン情報
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_yourusername_sns-app_internal_dto_respon\
                  se.AuthResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_yourusername_sns-app_pkg_errors.ErrorRes\
                  ponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_yourusername_sns-app_pkg_errors.ErrorRes\
                  ponse"
        "500":
