      tags:
        - auth
      summary: ユーザー登録
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/request.RegisterRequest"
        description: 登録情報
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/response.AuthResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errors.ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
