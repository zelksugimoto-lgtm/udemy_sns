        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errors.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errors.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errors.ErrorResponse"
