openapi: 3.0.0
info:
  description: Twitter風のSNSアプリケーションのREST API
  title: SNS Application API
  termsOfService: http://swagger.io/terms/
  contact:
    name: API Support
    url: http://www.swagger.io/support
    email: support@swagger.io
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: "1.0"
paths:
  /auth/login:
    post:
      description: メールアドレスとパスワードでログインし、JWTトークンを返す
      tags:
        - auth
      summary: ログイン
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/request.LoginRequest"
        description: ログイン情報
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/response.AuthResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errors.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errors.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errors.ErrorResponse"
  /auth/me:
    get:
      security:
        - BearerAuth: []
      description: JWTトークンから現在ログイン中のユーザー情報を取得
      tags:
        - auth
      summary: 現在のユーザー情報取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/response.UserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errors.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
