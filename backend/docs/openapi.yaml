        - BearerAuth: []
      description: ブックマークした投稿の一覧を取得
      tags:
        - bookmarks
      summary: ブックマーク一覧取得
      parameters:
        - description: "取得件数（デフォルト: 20）"
          name: limit
          in: query
          schema:
            type: integer
        - description: "オフセット（デフォルト: 0）"
          name: offset
          in: query
          schema:
            type: integer
