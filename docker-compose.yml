version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sns_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: social_media_db
      TZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sns_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sns_api
    ports:
      - "8080:8080"
    environment:
      # Database
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: social_media_db

      # Server
      PORT: 8080
      ENV: development

      # CORS
      FRONTEND_URL: http://localhost:3000

      # JWT
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRATION: 168h

      # Admin Panel
      ADMIN_ROOT_USERNAME: admin
      ADMIN_ROOT_PASSWORD: admin123
      ADMIN_SESSION_SECRET: dev-session-secret-key-12345

      # E2E Testing (WARNING: Only enable in test environments!)
      AUTO_APPROVE_USERS: false

      # File Upload (Phase 2で使用)
      MAX_VIDEO_SIZE_MB: 20
      MAX_IMAGE_SIZE_MB: 5
      MAX_UPLOAD_FILES: 4

      # Timezone
      TZ: Asia/Tokyo
    volumes:
      - ./backend:/app
      - /app/tmp
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sns_network
    profiles:
      - dev

  # テスト環境用データベース
  db_test:
    image: postgres:15-alpine
    container_name: sns_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: social_media_db_test
      TZ: Asia/Tokyo
    ports:
      - "5433:5432"
    networks:
      - sns_network_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - test
    tmpfs:
      - /var/lib/postgresql/data  # テスト用DBはtmpfs（メモリ）を使用

  # テスト環境用APIサーバー
  api_test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sns_api_test
    ports:
      - "8081:8081"
    environment:
      # Database
      DB_HOST: db_test
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: social_media_db_test

      # Server
      PORT: 8081
      ENV: test

      # CORS (E2Eテスト用)
      FRONTEND_URL: http://localhost:3001

      # JWT
      JWT_SECRET: test-secret-key
      JWT_EXPIRATION: 168h

      # Admin Panel
      ADMIN_ROOT_USERNAME: admin
      ADMIN_ROOT_PASSWORD: admin123
      ADMIN_SESSION_SECRET: test-session-secret-key-12345

      # E2E Testing (E2Eテスト環境では自動承認を有効化)
      AUTO_APPROVE_USERS: true

      # File Upload (Phase 2で使用)
      MAX_VIDEO_SIZE_MB: 20
      MAX_IMAGE_SIZE_MB: 5
      MAX_UPLOAD_FILES: 4

      # Timezone
      TZ: Asia/Tokyo
    volumes:
      - ./backend:/app
      - /app/tmp
    depends_on:
      db_test:
        condition: service_healthy
    networks:
      - sns_network_test
    profiles:
      - test

volumes:
  postgres_data:
    driver: local

networks:
  sns_network:
    driver: bridge
  sns_network_test:
    driver: bridge
